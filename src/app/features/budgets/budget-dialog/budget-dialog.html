<div class="dialog-container">

  <div class="dialog-header">
    <h2>{{ isEditing ? 'Editar presupuesto' : 'Nuevo presupuesto' }}</h2>
    <button mat-icon-button (click)="cancel()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <form [formGroup]="form" (ngSubmit)="save()" class="dialog-form">

    <mat-form-field appearance="outline">
      <mat-label>Categoría</mat-label>
      <mat-select formControlName="category">
        @for (cat of categories; track cat.value) {
          <mat-option [value]="cat.value">{{ cat.label }}</mat-option>
        }
      </mat-select>
      <mat-error>Selecciona una categoría</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Límite mensual</mat-label>
      <span matTextPrefix>$&nbsp;</span>
      <input matInput type="number" formControlName="limit"
             placeholder="0.00" min="1" />
      <mat-error>Ingresa un límite válido</mat-error>
    </mat-form-field>

    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Mes</mat-label>
        <mat-select formControlName="month">
          @for (m of months; track m.value) {
            <mat-option [value]="m.value">{{ m.label }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Año</mat-label>
        <input matInput type="number" formControlName="year" />
      </mat-form-field>
    </div>

    <div class="dialog-actions">
      <button mat-stroked-button type="button" (click)="cancel()">Cancelar</button>
      <button mat-flat-button type="submit" [disabled]="form.invalid">
        {{ isEditing ? 'Guardar' : 'Crear presupuesto' }}
      </button>
    </div>

  </form>
</div>
