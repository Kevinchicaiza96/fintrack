<div class="dialog-container">

  <div class="dialog-header">
    <h2>{{ isEditing ? 'Editar transacción' : 'Nueva transacción' }}</h2>
    <button mat-icon-button (click)="cancel()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <form [formGroup]="form" (ngSubmit)="save()" class="dialog-form">

    <!-- Tipo -->
    <div class="type-toggle-wrap">
      <mat-button-toggle-group formControlName="type" (change)="onTypeChange()">
        <mat-button-toggle value="expense" class="toggle-expense">
          <mat-icon>trending_down</mat-icon>
          Gasto
        </mat-button-toggle>
        <mat-button-toggle value="income" class="toggle-income">
          <mat-icon>trending_up</mat-icon>
          Ingreso
        </mat-button-toggle>
      </mat-button-toggle-group>
    </div>

    <!-- Monto -->
    <mat-form-field appearance="outline">
      <mat-label>Monto</mat-label>
      <span matTextPrefix>$&nbsp;</span>
      <input matInput type="number" formControlName="amount"
             placeholder="0.00" min="0" step="0.01" />
      <mat-error>Ingresa un monto válido</mat-error>
    </mat-form-field>

    <!-- Descripción -->
    <mat-form-field appearance="outline">
      <mat-label>Descripción</mat-label>
      <input matInput formControlName="description"
             placeholder="¿En qué gastaste o ganaste?" />
      <mat-error>La descripción es requerida</mat-error>
    </mat-form-field>

    <!-- Categoría -->
    <mat-form-field appearance="outline">
      <mat-label>Categoría</mat-label>
      <mat-select formControlName="category">
        @for (cat of categories; track cat.value) {
          <mat-option [value]="cat.value">
            {{ cat.label }}
          </mat-option>
        }
      </mat-select>
      <mat-error>Selecciona una categoría</mat-error>
    </mat-form-field>

    <!-- Fecha -->
    <mat-form-field appearance="outline">
      <mat-label>Fecha</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="date" />
      <mat-datepicker-toggle matIconSuffix [for]="picker" />
      <mat-datepicker #picker />
    </mat-form-field>

    <!-- Nota -->
    <mat-form-field appearance="outline">
      <mat-label>Nota (opcional)</mat-label>
      <textarea matInput formControlName="note"
                placeholder="Detalles adicionales..."
                rows="2"></textarea>
    </mat-form-field>

    <div class="dialog-actions">
      <button mat-stroked-button type="button" (click)="cancel()">Cancelar</button>
      <button mat-flat-button type="submit"
              [disabled]="form.invalid"
              [class.btn-income]="currentType === 'income'"
              [class.btn-expense]="currentType === 'expense'">
        {{ isEditing ? 'Guardar' : 'Agregar' }}
      </button>
    </div>

  </form>
</div>
